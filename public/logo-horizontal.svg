<svg viewBox="0 0 520 110" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes line-glow { 0%, 100% { filter: drop-shadow(0 0 3px rgba(0, 180, 216, 0.4)); } 50% { filter: drop-shadow(0 0 6px rgba(0, 180, 216, 0.9)); } }
    
    .icon-rotate { transform-origin: 55px 55px; animation: rotate-cw 60s linear infinite; }
    .orbit-1 { transform-origin: 55px 55px; animation: rotate-cw 20s linear infinite; }
    .orbit-2 { transform-origin: 55px 55px; animation: rotate-ccw 25s linear infinite; }
    .orbit-3 { transform-origin: 55px 55px; animation: rotate-cw 30s linear infinite; }
    .core-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .branding-glow { animation: line-glow 4s ease-in-out infinite; }
  </style>

  <!-- Icon Section -->
  <g class="icon-rotate">
    <circle cx="55" cy="55" r="50" fill="none" stroke="#00B4D8" stroke-width="4" opacity="0.85"/>
    <circle cx="55" cy="55" r="46" fill="none" stroke="#00B4D8" stroke-width="1.5" opacity="0.4"/>
    <g stroke="#00B4D8" stroke-linecap="round">
      <line x1="55" y1="5" x2="55" y2="18" stroke-width="4"/>
      <line x1="55" y1="92" x2="55" y2="105" stroke-width="4"/>
      <line x1="5" y1="55" x2="18" y2="55" stroke-width="4"/>
      <line x1="92" y1="55" x2="105" y2="55" stroke-width="4"/>
    </g>
  </g>

  <g class="orbit-1"><ellipse cx="55" cy="55" rx="40" ry="14" fill="none" stroke="#FF6B35" stroke-width="2.5" opacity="0.5" transform="rotate(-30 55 55)"/></g>
  <g class="orbit-2"><ellipse cx="55" cy="55" rx="40" ry="14" fill="none" stroke="#FF6B35" stroke-width="2.5" opacity="0.5" transform="rotate(30 55 55)"/></g>
  <g class="orbit-3"><ellipse cx="55" cy="55" rx="40" ry="14" fill="none" stroke="#FF6B35" stroke-width="2.5" opacity="0.5" transform="rotate(90 55 55)"/></g>

  <g class="core-glow">
    <line x1="55" y1="15" x2="55" y2="55" stroke="#00B4D8" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>
    <line x1="82" y1="22" x2="55" y2="55" stroke="#FF6B35" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
    <line x1="95" y1="55" x2="55" y2="55" stroke="#00B4D8" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>
    <line x1="82" y1="88" x2="55" y2="55" stroke="#FF6B35" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
    <line x1="55" y1="95" x2="55" y2="55" stroke="#00B4D8" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>
    <line x1="28" y1="88" x2="55" y2="55" stroke="#FF6B35" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
    <line x1="15" y1="55" x2="55" y2="55" stroke="#00B4D8" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>
    <line x1="28" y1="22" x2="55" y2="55" stroke="#FF6B35" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  </g>

  <circle cx="55" cy="55" r="18" fill="#060610" stroke="#00B4D8" stroke-width="4"/>
  <circle class="core-glow" cx="55" cy="55" r="13" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>
  
  <text x="55" y="52" font-family="monospace" font-weight="900" font-size="9" fill="#F0EDE8" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">AITDL</text>
  <line x1="38" y1="57" x2="72" y2="57" stroke="#FF6B35" stroke-width="2" opacity="0.9"/>
  <text x="55" y="63" font-family="monospace" font-weight="900" font-size="3.5" fill="#FF6B35" text-anchor="middle" dominant-baseline="middle" letter-spacing="1.5" opacity="1">AI·TECH·DL</text>

  <!-- Divider -->
  <line x1="120" y1="12" x2="120" y2="98" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>

  <!-- Word mark Section -->
  <g class="branding-glow">
    <text x="138" y="58" font-family="monospace" font-weight="950" font-size="42" fill="#F0EDE8" letter-spacing="2.5">AITDL</text>
    <line x1="138" y1="72" x2="510" y2="72" stroke="#FF6B35" stroke-width="3.5" opacity="0.7"/>
    <text x="138" y="86" font-family="monospace" font-weight="900" font-size="8.5" fill="#00B4D8" letter-spacing="1.8" opacity="1">ARTIFICIAL INTELLIGENCE TECHNOLOGY</text>
    <text x="138" y="98" font-family="monospace" font-weight="900" font-size="8.5" fill="#FF6B35" letter-spacing="1.8" opacity="1">&amp; DEEP LEARNING · INDIA'S AI COMMAND CENTER</text>
  </g>
</svg>
