<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse-energy { 0%, 100% { opacity: 0.6; stroke-width: 4; } 50% { opacity: 1; stroke-width: 6; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    
    .ring-outer { transform-origin: center; animation: rotate-cw 60s linear infinite; }
    .ticks { transform-origin: center; animation: rotate-ccw 120s linear infinite; }
    .orbit-1 { transform-origin: center; animation: rotate-cw 15s linear infinite; }
    .orbit-2 { transform-origin: center; animation: rotate-ccw 20s linear infinite; }
    .orbit-3 { transform-origin: center; animation: rotate-cw 25s linear infinite; }
    .core-pulse { animation: pulse-energy 3s ease-in-out infinite; }
    .text-float { animation: float 4s ease-in-out infinite; }
  </style>

  <!-- Outer precision ring -->
  <circle class="ring-outer" cx="120" cy="120" r="112" fill="none" stroke="#00B4D8" stroke-width="4" opacity="0.8"/>
  <circle class="ring-outer" cx="120" cy="120" r="108" fill="none" stroke="#00B4D8" stroke-width="1.5" opacity="0.4"/>

  <!-- 72 precision tick marks -->
  <g class="ticks" stroke="#00B4D8" stroke-linecap="round">
    <line x1="120" y1="8" x2="120" y2="22" stroke-width="5"/>
    <line x1="120" y1="218" x2="120" y2="232" stroke-width="5"/>
    <line x1="8" y1="120" x2="22" y2="120" stroke-width="5"/>
    <line x1="218" y1="120" x2="232" y2="120" stroke-width="5"/>
    <line x1="35" y1="35" x2="45" y2="45" stroke-width="4"/>
    <line x1="195" y1="35" x2="205" y2="45" stroke-width="4"/>
    <line x1="35" y1="195" x2="45" y2="185" stroke-width="4"/>
    <line x1="195" y1="195" x2="205" y2="185" stroke-width="4"/>
  </g>

  <!-- 3 orbital rings -->
  <g class="orbit-1"><ellipse cx="120" cy="120" rx="88" ry="32" fill="none" stroke="#FF6B35" stroke-width="3.5" opacity="0.5" transform="rotate(-30 120 120)"/></g>
  <g class="orbit-2"><ellipse cx="120" cy="120" rx="88" ry="32" fill="none" stroke="#FF6B35" stroke-width="3.5" opacity="0.5" transform="rotate(30 120 120)"/></g>
  <g class="orbit-3"><ellipse cx="120" cy="120" rx="88" ry="32" fill="none" stroke="#FF6B35" stroke-width="3.5" opacity="0.5" transform="rotate(90 120 120)"/></g>

  <!-- 12 main energy spokes -->
  <g class="core-pulse">
    <line x1="120" y1="30" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="172" y1="42" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
    <line x1="208" y1="78" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="210" y1="120" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
    <line x1="208" y1="162" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="172" y1="198" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
    <line x1="120" y1="210" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="68" y1="198" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
    <line x1="32" y1="162" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="30" y1="120" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
    <line x1="32" y1="78" x2="120" y2="120" stroke="#00B4D8" stroke-width="5" opacity="0.95" stroke-linecap="round"/>
    <line x1="68" y1="42" x2="120" y2="120" stroke="#FF6B35" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
  </g>

  <!-- nodes -->
  <circle cx="120" cy="30" r="9" fill="#00B4D8"/>
  <circle cx="172" cy="42" r="8" fill="#FF6B35"/>
  <circle cx="208" cy="78" r="9" fill="#00B4D8"/>
  <circle cx="210" cy="120" r="8" fill="#FF6B35"/>
  <circle cx="208" cy="162" r="9" fill="#00B4D8"/>
  <circle cx="172" cy="198" r="8" fill="#FF6B35"/>
  <circle cx="120" cy="210" r="9" fill="#00B4D8"/>
  <circle cx="68" cy="198" r="8" fill="#FF6B35"/>
  <circle cx="32" cy="162" r="9" fill="#00B4D8"/>
  <circle cx="30" cy="120" r="8" fill="#FF6B35"/>
  <circle cx="32" cy="78" r="9" fill="#00B4D8"/>
  <circle cx="68" cy="42" r="8" fill="#FF6B35"/>

  <!-- Core -->
  <circle cx="120" cy="120" r="38" fill="#060610" stroke="#00B4D8" stroke-width="5"/>
  <circle class="core-pulse" cx="120" cy="120" r="32" fill="none" stroke="#FF6B35" stroke-width="3" opacity="0.85"/>
  <circle class="ticks" cx="120" cy="120" r="24" fill="none" stroke="#00B4D8" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,3"/>

  <!-- Word mark -->
  <g class="text-float">
    <text x="120" y="114" font-family="monospace" font-weight="900" font-size="16" fill="#F0EDE8" text-anchor="middle" dominant-baseline="middle" letter-spacing="1.5">AITDL</text>
    <line x1="88" y1="121" x2="152" y2="121" stroke="#FF6B35" stroke-width="2.5" opacity="1"/>
    <text x="120" y="130" font-family="monospace" font-weight="900" font-size="5.5" fill="#FF6B35" text-anchor="middle" dominant-baseline="middle" letter-spacing="2.5" opacity="1">AI · TECH · DL</text>
  </g>
</svg>
